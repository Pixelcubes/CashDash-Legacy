<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CashDash</title>
    <link rel="stylesheet" href="./css/register.css">
    <script src="./js/register.js"></script>
</head>

<body>
    <div id="siteLogo">
        <a href="./landing.html">
            <img src="assets/MockLogo.png" alt="CashDash Logo" id="logo">
        </a>
    </div>
    <div id="regForm">
        <div id="inputFields">
            <p id="title">
                Register
            </p>
            <hr>
            <label for="usernameInput" id="usernameLabel">
                Username
            </label>
            <input type="text" placeholder="Username" id="usernameInput">
            <label for="passwordInput" id="passwordLabel">
                Password
            </label>
            <input type="text" placeholder="Password" id="passwordInput">
            <div id="response-msg">
            </div>
            <button id="continueBtn">
                Continue
            </button>
        </div>
    </div>
</body>

</html>
