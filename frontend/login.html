<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CashDash</title>
    <link rel="stylesheet" href="./css/login.css">
    <script src="./js/login.js"></script>
</head>

<body>
    <div id="login-form">
        <div class="logo">
            <img src="assets/MockLogo.png" alt="CashDash Logo">
        </div>
        <div id="input-fields">
            <p id="title">
                Welcome Back!
            </p>
            <div class="userInput">
                <label for="usernameInput" id="usernameLabel">
                    Username
                </label>
                <input type="text" placeholder="Username" id="usernameInput">
            </div>
            <div class="userInput">
                <label for="passwordInput" id="passwordLabel">
                    Password
                </label>
                <input type="text" placeholder="Password" id="passwordInput">
            </div>
            <button id="loginBtn">
                Login
            </button>
        </div>
    </div>
</body>

</html>
