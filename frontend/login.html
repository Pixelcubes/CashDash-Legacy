<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login | CashDash</title>
    <link rel="stylesheet" href="./css/login.css">
    <script src="./js/login.js"></script>
</head>

<body>
    <div id="login-form">
        <div class="logo">
            <img src="assets/MockLogo.png" alt="CashDash Logo">
        </div>
        <div id="input-fields">
            <p id="title">
                Welcome Back!
            </p>
            <div class="userInput">
                <label for="usernameInput" id="usernameLabel">
                    Username
                </label>
                <input type="text" placeholder="Username" id="usernameInput">
            </div>
            <div class="userInput">
                <label for="passwordInput" id="passwordLabel">
                    Password
                </label>
                <input type="password" placeholder="Password" id="passwordInput">
            </div>
            <button id="loginBtn">
                Login
            </button>
            <p style="margin-top: 20px; text-align: center; color: #666;">
                Don't have an account? <a href="register.html" style="color: #4CAF50; text-decoration: none;">Sign up</a>
            </p>
        </div>
    </div>
</body>

</html>
