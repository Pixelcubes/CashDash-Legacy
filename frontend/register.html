<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Register | CashDash</title>
    <link rel="stylesheet" href="./css/register.css">
    <script src="./js/register.js"></script>
</head>

<body>
    <div id="siteLogo">
        <a href="./index.html">
            <img src="assets/MockLogo.png" alt="CashDash Logo" id="logo">
        </a>
    </div>
    <div id="regForm">
        <div id="inputFields">
            <p id="title">
                Register
            </p>
            <hr>
            <label for="usernameInput" id="usernameLabel">
                Username
            </label>
            <input type="text" placeholder="Username" id="usernameInput">
            <label for="passwordInput" id="passwordLabel">
                Password
            </label>
            <input type="password" placeholder="Password" id="passwordInput">
            <div id="response-msg">
            </div>
            <button id="continueBtn">
                Continue
            </button>
            <p style="margin-top: 15px; text-align: center; color: #666; font-size: 14px;">
                Already have an account? <a href="login.html" style="color: #4CAF50; text-decoration: none;">Login</a>
            </p>
        </div>
    </div>
</body>

</html>
